name: Keep Render warm

# Render's free tier sleeps a service after ~15 minutes of inactivity, and the
# wake-up takes 30-60s. A cheap GitHub-hosted cron ping every 10 minutes keeps
# the backend warm so the first user of the day doesn't pay the cold-start tax.
# GitHub-hosted cron is best-effort and can drift several minutes; that's fine
# for keep-warm.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/health
        run: |
          curl -fsS --max-time 60 -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" \
            https://wacmr-api.onrender.com/api/health
