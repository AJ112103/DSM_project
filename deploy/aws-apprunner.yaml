version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r backend/requirements.txt
  env:
    - name: PYTHONPATH
      value: /app
run:
  command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: GROQ_API_KEY
      value: "${GROQ_API_KEY}"
